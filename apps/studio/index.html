<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vsim Studio</title>
    <style>
      :root { --bg:#15171c; --panel:#1d2026; --panel2:#23272f; --line:#30353f; --fg:#e6e9ef; --mut:#8b93a3; --accent:#6ea8fe; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
        font: 13px/1.4 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      #app { display: grid; grid-template-columns: 260px 1fr; grid-template-rows: 40px 1fr 92px; height: 100vh; }
      header { grid-column: 1 / 3; display: flex; align-items: center; gap: 10px; padding: 0 14px;
        background: var(--panel); border-bottom: 1px solid var(--line); }
      header .logo { font-weight: 700; letter-spacing: .3px; }
      header .logo b { color: var(--accent); }
      header .tag { color: var(--mut); font-size: 12px; }
      header .spacer { flex: 1; }
      header button { background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
        border-radius: 6px; padding: 5px 10px; cursor: pointer; }
      header button:hover { border-color: var(--accent); }
      aside { grid-row: 2 / 4; background: var(--panel); border-right: 1px solid var(--line);
        overflow-y: auto; display: flex; flex-direction: column; }
      .sec { padding: 8px 12px; border-bottom: 1px solid var(--line); }
      .sec h2 { margin: 0 0 6px; font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--mut); }
      #tree .row { padding: 4px 8px; border-radius: 5px; cursor: pointer; display: flex; gap: 8px; align-items: center; }
      #tree .row:hover { background: var(--panel2); }
      #tree .row.sel { background: #2a3550; color: #fff; }
      #tree .row .kind { color: var(--mut); font-size: 11px; margin-left: auto; }
      #tree .row.child { padding-left: 22px; }
      main { position: relative; display: flex; align-items: center; justify-content: center;
        background: #0e1014 radial-gradient(circle at 50% 40%, #1b1f27, #0e1014); overflow: hidden; }
      canvas { max-width: 100%; max-height: 100%; background: #000; border-radius: 6px;
        box-shadow: 0 10px 40px rgba(0,0,0,.5); }
      /* Stage tightly wraps the preview canvas so the text-overlay canvas can sit exactly on top. */
      #stage { position: relative; display: flex; max-width: 100%; max-height: 100%; }
      #preview-overlay { position: absolute; inset: 0; width: 100%; height: 100%;
        background: transparent; box-shadow: none; pointer-events: none; }
      footer { grid-column: 1 / 3; background: var(--panel); border-top: 1px solid var(--line);
        display: flex; align-items: center; gap: 14px; padding: 0 16px; }
      footer button.play { width: 40px; height: 40px; border-radius: 50%; font-size: 16px;
        background: var(--accent); color: #0b0d11; border: 0; cursor: pointer; }
      #scrub { flex: 1; }
      #frame { font-variant-numeric: tabular-nums; color: var(--mut); min-width: 92px; text-align: right; }
      .field { display: grid; grid-template-columns: 58px 1fr 18px; align-items: center; gap: 6px; margin: 4px 0; }
      .field > label { color: var(--mut); }
      .kbtn { width: 16px; height: 16px; padding: 0; line-height: 13px; text-align: center; font-size: 10px;
        border: 1px solid var(--line); border-radius: 4px; background: var(--panel2); color: var(--mut); cursor: pointer; }
      .kbtn:hover { border-color: var(--accent); }
      .kbtn.on { background: #caa23a; color: #1a1a1a; border-color: #caa23a; } /* property is animated */
      .timeline { flex: 1; display: flex; flex-direction: column; gap: 3px; }
      #kfstrip { position: relative; height: 12px; }
      .kf { position: absolute; top: 1px; width: 9px; height: 9px; background: #caa23a; border: 1px solid #7a6420;
        transform: translateX(-50%) rotate(45deg); cursor: pointer; }
      .kf:hover { background: #ffd45e; }
      .vec { display: flex; gap: 4px; }
      .vec input { width: 100%; }
      input[type=number] { background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
        border-radius: 5px; padding: 3px 5px; width: 100%; }
      input[type=color] { width: 100%; height: 26px; background: var(--panel2); border: 1px solid var(--line); border-radius: 5px; }
      #inspector .empty { color: var(--mut); font-style: italic; }
      #inspector h3 { margin: 2px 0 8px; font-size: 13px; }
      #prompt { width: 100%; background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
        border-radius: 6px; padding: 6px 8px; margin-bottom: 6px; }
      button.apply { width: 100%; background: var(--accent); color: #0b0d11; border: 0; border-radius: 6px;
        padding: 7px; font-weight: 600; cursor: pointer; }
      button.apply:disabled { opacity: .55; cursor: default; }
      .aistatus { color: var(--mut); font-size: 12px; margin-top: 6px; min-height: 16px; }
      .aistatus.err { color: #ff8a8a; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <span class="logo">vsim <b>Studio</b></span>
        <span class="tag">deterministic 3D — preview == render</span>
        <span class="spacer"></span>
        <button id="render">Render draft</button>
        <button id="renderPhoto">Render photoreal</button>
        <button id="export">Export scene JSON</button>
      </header>
      <aside>
        <div class="sec"><h2>Scene</h2><div id="tree"></div></div>
        <div class="sec" style="flex:1"><h2>Inspector</h2><div id="inspector"><p class="empty">Select an object.</p></div></div>
        <div class="sec"><h2>AI copilot</h2>
          <input id="prompt" type="text" placeholder="e.g. make the cube blue" />
          <button id="apply" class="apply">Apply</button>
          <div id="aistatus" class="aistatus"></div>
        </div>
      </aside>
      <main><div id="stage"><canvas id="preview"></canvas><canvas id="preview-overlay"></canvas></div></main>
      <footer>
        <button class="play" id="play">▶</button>
        <div class="timeline">
          <div id="kfstrip"></div>
          <input type="range" id="scrub" min="0" value="0" step="1" />
        </div>
        <span id="frame">0 / 0</span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
