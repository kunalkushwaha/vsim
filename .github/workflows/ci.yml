name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: pnpm install --frozen-lockfile

      - name: Determinism lint (no Math.random/Date.now in runtime)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (incl. determinism golden gate)
        run: pnpm test

      - name: Smoke render (end-to-end code → video)
        run: pnpm example:cube
